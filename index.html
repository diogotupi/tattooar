<!DOCTYPE html>

  <body>
    <div id="app">
      <main class="hero">
        <header class="brand">
          <img class="brand__logo" alt="CAPAZ TATTOO" decoding="async" />
        </header>

        <p class="hero__hint">Aponte para uma arte reconhecida e veja a animação em cima dela.</p>
        <button type="button" class="cam-btn" id="openAr" aria-label="Abrir câmera AR">
          <span class="cam-btn__ring" aria-hidden="true"></span>

        <span class="foot__note">CAPAZ TATTOO · AR</span>
      </footer>

      <div class="ar-layer" id="arLayer" hidden>
        <div class="ar-layer__chrome">
          <button type="button" class="ar-back" id="closeAr" aria-label="Fechar câmera">
            ← Fechar
          </button>
          <p class="ar-layer__scan" id="scanHint">Procurando arte…</p>
